{% extends 'problems/base.html' %}

{% block title %}Delete Problem - Quantly{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-5">
        <div class="card border-danger mb-3" style="background: rgba(255,0,0,0.05); backdrop-filter: blur(10px);">
            <div class="card-header bg-transparent border-danger text-center">
                <h3 class="text-danger mb-0">Confirm Deletion</h3>
            </div>
            <div class="card-body text-center py-5">
                <p class="lead text-light">Are you sure you want to delete the problem "{{ object.title }}"?</p>
                <p class="text-muted small mb-4">This action cannot be undone.</p>
                
                <form method="post" class="d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <a href="{% url 'problems:problem_detail' object.pk %}" class="btn btn-secondary px-4">Cancel</a>
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
